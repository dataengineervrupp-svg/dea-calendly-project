name: Deploy Scripts to S3

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest else echo "No tests directory yet"; fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Upload scripts to S3
        run: |
          aws s3 cp src/calendly_webhooks_to_silver.py s3://calendly-project-467875655273-us-east-1-an/scripts
          